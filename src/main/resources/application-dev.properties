# =============================================
# CONFIGURAÇŐES DO BANCO MYSQL
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/bd_logistica2v?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:" "}

# =============================================
# CONFIGURAÇŐES JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.sql.init.mode=always

# =============================================
# SEGURANÇA (JWT)
# =============================================
jwt.secret=aplicativo-dois-v-projeto-pim-2025

# =============================================
# UPLOAD DE ARQUIVOS (GOOGLE DRIVE)
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =============================================
# CONFIGURAÇĂO CORS
# =============================================
cors.origins=${CORS_ORIGINS:http://localhost:5500,http://localhost:3000,http://localhost:8080,http://localhost:58765}

