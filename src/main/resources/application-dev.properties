# Configuração da inicialização do banco
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Hibernate - cria as tabelas primeiro
spring.jpa.hibernate.ddl-auto=create-drop

# H2
spring.datasource.url=jdbc:h2:mem:bd_logistica2v;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Outras configurações...
jwt.secret=aplicativo-doisv-projeto-pim-2025
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
cors.origins=${CORS_ORIGINS:http://localhost:5500,http://localhost:3000,http://localhost:8080,http://localhost:58765}