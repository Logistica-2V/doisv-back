#Conexão com banco de dados MySQL
#Altera a estrutura da tabela caso a entidade tenha mudanças.
spring.jpa.hibernate.ddl-auto=update
#Acessa o banco de dados
spring.datasource.url=jdbc:mysql://localhost:3306/bd_logistica2v?createDatabaseIfNotExist=true
#Usuário do banco de dados
spring.datasource.username=root
#Senha do banco de dados
spring.datasource.password=${DB_PASSWORD:" "}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.sql.init.mode=always
#Chave de segurança
jwt.secret=aplicativo-dois-v-projeto-pim-2025

#Tamanho máximo dos arquivos para o Google Drive
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

cors.origins=${CORS_ORIGINS:http://localhost:5500,http://localhost:3000,http://localhost:8080,http://localhost:58765}


