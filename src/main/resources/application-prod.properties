# =============================================
# CONFIGURAĂ‡Ă•ES DO BANCO DE DADOS (PRODUĂ‡ĂƒO)
# =============================================
# ConexĂ£o via variĂ¡veis de ambiente para seguranĂ§a
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# =============================================
# CONFIGURAĂ‡Ă•ES JPA / HIBERNATE (PRODUĂ‡ĂƒO)
# =============================================
# 'none' para evitar que o Hibernate modifique o schema do banco acidentalmente
spring.jpa.hibernate.ddl-auto=none

# Dialeto especĂ­fico do banco de produĂ§Ă£o
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Desabilitar logs SQL para nĂ£oo poluir os logs e melhorar a performance
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# =============================================
# SEGURANĂ‡A (JWT)
# =============================================
# Chave secreta via variĂ¡vel de ambiente para seguranĂ§a
jwt.secret=${JWT_SECRET}

# ExpiraĂ§Ă£o do token para Lojista (12 horas)
jwt.lojista.expiration=43200000

# ExpiraĂ§Ă£o do token para Consumidor (1 hora)
jwt.consumidor.expiration=3600000

# =============================================
# UPLOAD DE ARQUIVOS
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# =============================================
# CONFIGURAĂ‡ĂƒO CORS (PRODUĂ‡ĂƒO)
# =============================================
# Define as origens permitidas via variï¿½vel de ambiente.
# Ex: "https://meusite.com,https://meuapp.com"
cors.origins=${CORS_ORIGINS}

# =============================================
# VERSĂƒO DE DISTRIBUIĂ‡ĂƒO (Doisv/Logvert)
# =============================================
app.distribuicao.ativa=${APP_DISTRIBUICAO}

# =============================================
# CONFIGURAĂ‡ĂƒO ENVIO DE EMAIL (PRODUĂ‡ĂƒO)
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# Use variĂ¡veis de ambiente para credenciais, especialmente a senha.
spring.mail.username=${MAIL_USERNAME:logistica.doisv@gmail.com}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =============================================
# DOMINIOS DA APLICAÇĂO
# =============================================
app.dominio.email = ${DOMINIO_EMAIL}
app.dominio.cnpj = ${DOMINIO_CNPJ}