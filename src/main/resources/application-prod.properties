# =============================================
# CONFIGURAĮÕES DO BANCO DE DADOS (PRODUĮÃO)
# =============================================
# Conexão via variáveis de ambiente para seguranįa
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# =============================================
# CONFIGURAĮÕES JPA / HIBERNATE (PRODUĮÃO)
# =============================================
# 'none' para evitar que o Hibernate modifique o schema do banco acidentalmente
spring.jpa.hibernate.ddl-auto=none

# Dialeto específico do banco de produįão
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Desabilitar logs SQL para não poluir os logs e melhorar a performance
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# =============================================
# SEGURANĮA (JWT)
# =============================================
# Chave secreta via variável de ambiente para seguranįa
jwt.secret=${JWT_SECRET}

# Expiraįão do token para Lojista (12 horas)
jwt.lojista.expiration=43200000

# Expiraįão do token para Consumidor (1 hora)
jwt.consumidor.expiration=3600000

# =============================================
# UPLOAD DE ARQUIVOS
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =============================================
# CONFIGURAĮÃO CORS (PRODUĮÃO)
# =============================================
# Define as origens permitidas via variável de ambiente.
# Ex: "https://meusite.com,https://meuapp.com"
cors.origins=${CORS_ORIGINS}

# =============================================
# VERSÃO DE DISTRIBUIĮÃO (Doisv/Logvert)
# =============================================
app.distribuicao.ativa=${APP_DISTRIBUICAO}

# =============================================
# CONFIGURAĮÃO ENVIO DE EMAIL (PRODUĮÃO)
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# Use variáveis de ambiente para credenciais, especialmente a senha.
spring.mail.username=${MAIL_USERNAME:logistica.doisv@gmail.com}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true